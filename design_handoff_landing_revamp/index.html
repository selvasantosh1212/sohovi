<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sohovi — Marketing UI Kit</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="_kit.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  /* ============================================================
     MARKETING PAGE — "INSTANT" THEME OVERRIDE
     Pure-white canvas, heavy near-black headlines, neutral-gray
     rounded product tiles, black CTAs. Calm monochrome frame —
     color lives only inside the live data mockups. Scoped to this
     page only; the dashboard kit keeps its own theme.
     ============================================================ */
  :root {
    --bg:         #FFFFFF;   /* true flat white canvas            */
    --bg-soft:    #F4F4F5;   /* neutral-gray product tiles        */
    --surface:    #FFFFFF;   /* cards / panels                    */
    --surface-2:  #F1F1F3;   /* hover / inputs / track            */
    --surface-3:  #E8E8EB;   /* active / popover                  */
    --line:       #E9E9EC;   /* refined hairline border           */
    --line-soft:  #F1F1F3;   /* faint internal divider            */

    --text:       #0A0A0A;   /* near-black headlines / ink        */
    --text-soft:  #5B5B63;   /* neutral-gray body                 */
    --text-mute:  #8A8A90;   /* meta / captions                   */
    --text-faint: #BDBDC2;   /* ghost / disabled                  */

    --radius-lg:  20px;      /* softer, larger card rounding      */
    --grad-bg:    #0A0A0A;   /* logo mark → solid black           */
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: auto; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
  ::selection { background: rgba(10,10,10,.12); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 999px; border: 2px solid var(--bg); }
  [data-lucide] svg { width: 100%; height: 100%; }
  @keyframes mkt-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Headlines: heavier, tighter, fully black — no gradient/color word. */
  .ds-display { font-weight: 800; letter-spacing: -0.045em; }
  .ds-h1 { font-weight: 800; letter-spacing: -0.038em; }
  .ds-h2 { font-weight: 700; letter-spacing: -0.028em; }
  .ds-grad-text {
    background: none;
    -webkit-text-fill-color: var(--text);
    color: var(--text);
  }

  /* Hero focal animation: a hand-drawn PEN STRIKE scribbles through
     "expensive tools" to land the "you don't need it" message, while
     the words dim. Draws on → holds → fades → loops (~5.4s). */
  .hero-strike {
    position: relative;
    display: inline-block;
    white-space: nowrap;
    color: var(--text);
    animation: heroStrikeText 5.4s cubic-bezier(.65,0,.35,1) 1s infinite;
  }
  .hero-pen {
    position: absolute;
    left: -2%;
    width: 104%;
    top: 52%;
    height: 0.52em;
    transform: translateY(-50%);
    overflow: visible;
    pointer-events: none;
  }
  .hero-pen path {
    fill: none;
    stroke: #FFE439;
    stroke-width: 4.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    vector-effect: non-scaling-stroke;
    /* dash + animation injected by JS once real path length is measured */
    stroke-dasharray: 2000;
    stroke-dashoffset: 2000;
  }
  @keyframes heroStrikeText {
    0%, 6%    { color: var(--text); }
    20%, 70%  { color: var(--text-mute); }
    86%, 100% { color: var(--text); }
  }
  @media (prefers-reduced-motion: reduce) {
    .hero-strike { animation: none; color: var(--text-mute); }
    .hero-pen path { animation: none; stroke-dashoffset: 0; opacity: 1; }
  }

  /* Eyebrows: quiet neutral-gray uppercase label. */
  .ds-eyebrow { color: var(--text-mute); letter-spacing: 0.16em; font-weight: 700; }

  /* Buttons: black primary, soft-rounded rect — Instant style. */
  .sv-btn { border-radius: 12px; font-weight: 600; }
  .sv-btn--primary { background: #0A0A0A; color: #fff; box-shadow: none; }
  .sv-btn--primary:hover { background: #2A2A2E; box-shadow: none; }
  .sv-btn--outline { background: #fff; color: var(--text); border-color: var(--line); }
  .sv-btn--outline:hover { background: var(--surface-2); color: var(--text); border-color: #DBDBDF; }

  /* Cards: rounded, hairline, soft low shadow (no glow on hover). */
  .sv-card { box-shadow: 0 1px 2px rgba(10,10,10,.03), 0 10px 28px -18px rgba(10,10,10,.12) !important; }
  .sv-card--hover:hover {
    border-color: var(--line) !important;
    box-shadow: 0 1px 2px rgba(10,10,10,.04), 0 16px 38px -20px rgba(10,10,10,.18) !important;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Primitives.jsx?v=20"></script>
<script type="text/babel" src="Hero.jsx?v=20"></script>
<script type="text/babel" src="Sections.jsx?v=20"></script>

<script type="text/babel">
function App() {
  return (
    <div className="mkt-scroll">
      <MktNav />
      <MktHero />
      <BrandStrip />
      <Capabilities />
      <Pricing />
      <FinalCTA />
      <MktFooter />
    </div>
  );
}
if (window.lucide) lucide.createIcons();
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

/* Pen-strike: measure the real drawn length so the dash spans the
   whole phrase exactly (browsers ignore pathLength for dasharray
   under preserveAspectRatio="none"), then inject the draw-on loop. */
(function initPenStrike() {
  const path = document.querySelector(".hero-pen path");
  if (!path || !path.getTotalLength) { return setTimeout(initPenStrike, 120); }
  const L = Math.ceil(path.getTotalLength());
  if (!L) { return setTimeout(initPenStrike, 120); }
  const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const st = document.createElement("style");
  st.textContent = reduce
    ? `.hero-pen path { stroke-dasharray: ${L}; stroke-dashoffset: 0; opacity: 1; }`
    : `.hero-pen path { stroke-dasharray: ${L}; stroke-dashoffset: ${L}; animation: heroPenDraw 5.4s cubic-bezier(.55,0,.3,1) 1s infinite; }
       @keyframes heroPenDraw {
         0%        { stroke-dashoffset: ${L}; opacity: 1; }
         16%, 70%  { stroke-dashoffset: 0;   opacity: 1; }
         85%, 100% { stroke-dashoffset: 0;   opacity: 0; }
       }`;
  document.head.appendChild(st);
})();
</script>
</body>
</html>
